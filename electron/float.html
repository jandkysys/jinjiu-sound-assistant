<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline';" />
  <style>
    /* ── 重置 ─────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 130px;
      height: 46px;
      background: transparent;
      overflow: hidden;
      font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      /* 整个窗口可拖动（覆盖在胶囊外的透明区域） */
      -webkit-app-region: drag;
      user-select: none;
    }

    /* ── 外层拖动容器（透明，占满窗口） ───────────────────── */
    .drag-layer {
      position: absolute;
      inset: 0;
      -webkit-app-region: drag;
    }

    /* ── 胶囊主体（不参与拖动，可点击） ───────────────────── */
    .capsule {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 126px;
      height: 42px;
      border-radius: 21px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      -webkit-app-region: no-drag;

      /* 白色水晶玻璃 */
      background: rgba(255, 252, 248, 0.96);
      border: 1.5px solid rgba(230, 182, 110, 0.55);
      box-shadow:
        0 2px 12px rgba(180, 140, 80, 0.18),
        0 1px 0 rgba(255, 255, 255, 0.9) inset;

      transition: background 0.22s, box-shadow 0.2s, opacity 0.22s;
    }

    .capsule:hover {
      background: rgba(255, 248, 235, 0.98);
      box-shadow:
        0 4px 16px rgba(180, 140, 80, 0.26),
        0 1px 0 rgba(255, 255, 255, 0.95) inset;
    }

    .capsule:active {
      transform: scale(0.97);
    }

    /* ── 关闭状态 ──────────────────────────────────────────── */
    .capsule.off {
      background: rgba(245, 243, 240, 0.92);
      border-color: rgba(200, 195, 185, 0.5);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 1px 0 rgba(255,255,255,0.8) inset;
    }

    /* ── 图标 ─────────────────────────────────────────────── */
    .icon {
      font-size: 15px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ── 状态文字 ─────────────────────────────────────────── */
    .label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(120, 80, 30, 0.88);
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    .capsule.off .label {
      color: rgba(160, 155, 148, 0.85);
    }

    /* ── 状态指示点 ───────────────────────────────────────── */
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #22c55e;
      box-shadow: 0 0 5px rgba(34, 197, 94, 0.9);
      transition: background 0.25s, box-shadow 0.25s;
    }

    .capsule.off .dot {
      background: rgba(255, 255, 255, 0.35);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <!-- 拖动层（覆盖整个窗口，使边缘区域也可拖动） -->
  <div class="drag-layer"></div>

  <!-- 胶囊按钮 -->
  <div class="capsule" id="capsule">
    <span class="icon" id="icon">🎵</span>
    <span class="label" id="label">音效快捷键</span>
    <div class="dot" id="dot"></div>
  </div>

  <script>
    "use strict";

    const capsule = document.getElementById("capsule");
    const label   = document.getElementById("label");
    const dot     = document.getElementById("dot");
    const icon    = document.getElementById("icon");

    let enabled = true;  // 本地缓存，避免闪烁

    // ── UI 更新 ─────────────────────────────────────────────────────────────

    function updateUI(state) {
      enabled = state;
      label.textContent = "音效快捷键";
      if (state) {
        capsule.classList.remove("off");
        icon.textContent = "🎵";
      } else {
        capsule.classList.add("off");
        icon.textContent = "🔇";
      }
    }

    // ── 初始化：从主进程获取当前状态 ────────────────────────────────────────

    window.floatAPI.getStatus().then(status => {
      updateUI(!!status);
    }).catch(() => {});

    // ── 监听主进程广播 ────────────────────────────────────────────────────────

    window.floatAPI.onHotkeyStatusChanged(status => {
      updateUI(!!status);
    });

    // ── 点击切换 ─────────────────────────────────────────────────────────────

    capsule.addEventListener("click", () => {
      // 立即本地反馈（避免等待 IPC 往返的闪烁感）
      const optimisticState = !enabled;
      updateUI(optimisticState);

      window.floatAPI.toggleHotkeys().then(newState => {
        updateUI(!!newState);
      }).catch(() => {
        // 失败时回滚
        updateUI(!optimisticState);
      });
    });

    // ── 右键菜单（原生 Electron 菜单）────────────────────────────────────────

    capsule.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      window.floatAPI.showContextMenu();
    });

    // 拖动层右键也显示菜单
    document.querySelector(".drag-layer").addEventListener("contextmenu", (e) => {
      e.preventDefault();
      window.floatAPI.showContextMenu();
    });
  </script>
</body>
</html>
